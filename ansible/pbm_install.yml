---
- name: Install PBM client
  hosts: cfg:shards:replsets
  become: yes
  tags: install,backup
  environment:
    PERCONA_TELEMETRY_DISABLE: "{{ '1' if disable_telemetry else '0' }}"
  tasks:
    - name: Enable PBM repository
      shell: "/usr/bin/percona-release enable pbm release"

    - name: Install pbm packages from repository (latest)
      package:
        name: "{{ pbm_package }}"
        state: present
      when: pbm_version is not defined or pbm_version == ''

    - name: Install pbm packages from repository (specific version – Debian/Ubuntu)
      apt:
        name: "{{ pbm_package | map('regex_replace', '^percona-backup-mongodb$', 'percona-backup-mongodb=' ~ pbm_version ~ '*') | list }}"
        state: present
        allow_downgrade: true
      when:
        - pbm_version is defined and pbm_version != ''
        - ansible_facts['os_family'] == 'Debian'

    - name: Install pbm packages from repository (specific version – RedHat)
      yum:
        name: "{{ pbm_package | map('regex_replace', '^percona-backup-mongodb$', 'percona-backup-mongodb-' ~ pbm_version) | list }}"
        state: present
      when:
        - pbm_version is defined and pbm_version != ''
        - ansible_facts['os_family'] == 'RedHat'

    - name: Disable Percona telemetry
      systemd:
        name: percona-telemetry-agent
        enabled: false
        state: stopped
        daemon_reload: yes
      ignore_errors: true
      when: disable_telemetry | bool

- name: Figure out backup URI for replica sets
  hosts: replsets
  tags: backup
  become: true
  vars:
    replset_group: "{{ (group_names | difference(['replsets', 'shards']))[0] }}"
    replset_name: "{{ replset_group if cluster is defined and cluster == replset_group else (cluster ~ '-' ~ replset_group if cluster is defined else replset_group) }}"
  tasks:
    - name: generate PBM_MONGODB_URI
      set_fact:
        mongodb_uri: "mongodb://{{ pbmuser }}:{{ pbmpwd }}@{% for h in groups[replset_group] %}{{ h }}:{{ mongo_port }}{% if not loop.last %},{% endif %}{% endfor %}/?replicaSet={{ replset_name }}&authSource=admin{% if use_tls %}&tls=true&tlsCertificateKeyFile={{ certificateKeyFile }}&tlsCAFile={{ CAFile }}{% endif %}"

- name: Figure out backup URI for sharded cluster
  hosts: shards:cfg
  tags: backup
  become: true
  tasks:
    - name: generate PBM_MONGODB_URI
      set_fact:
        mongodb_uri: "mongodb://{{ pbmuser }}:{{ pbmpwd }}@{% for h in groups[ 'cfg' ] %}{{ h }}:{{ cfg_server_port }}{% if not loop.last %},{% endif %}{% endfor %}/?replicaSet={{ cluster }}-cfg&authSource=admin{% if use_tls %}&tls=true&tlsCertificateKeyFile={{ certificateKeyFile }}&tlsCAFile={{ CAFile }}{% endif %}"

- name: Configure PBM agent and CLI
  hosts: cfg:shards:replsets
  tags: backup
  become: true
  tasks:
    - name: Load OS-specific variables
      include_vars: "vars/{{ ansible_facts['os_family'] }}.yml"

    - name: set up PBM_MONGODB_URI
      lineinfile:
        dest: /etc/profile
        line: export PBM_MONGODB_URI='{{ mongodb_uri }}'
        state: present

    - name: Configure credentials file for PBM agent
      template:
        src: templates/pbm-agent.j2
        dest: "{{ pbm_env_file }}"
      when: arbiter is not defined

    - name: Start PBM agent
      service:
        name: pbm-agent
        state: restarted
      when: arbiter is not defined

    - name: Prepare storage details file for PBM
      template:
        src: templates/pbm-storage.conf.j2
        dest: "{{ pbm_config_path }}"
      when: arbiter is not defined

- name: Gather facts of NFS server if needed
  hosts: nfs
  gather_facts: yes
  tags: backup
  tasks:
    - name: Collect minimal facts (if overall gather_facts disabled earlier)
      ansible.builtin.setup:
        filter: ansible_default_ipv4
      when: (storage_provider | default('filesystem')) == "filesystem"

- name: Configure NFS clients if needed
  hosts: cfg:shards:replsets
  tags: backup
  become: true
  tasks:
    - name: Validate NFS inventory when filesystem storage is enabled
      ansible.builtin.assert:
        that:
          - "'nfs' in groups"
          - "groups.get('nfs', []) | length > 0"
        fail_msg: "storage_provider=filesystem requires an inventory group [nfs] with at least one host"
      when: (storage_provider | default('filesystem')) == "filesystem"
      run_once: true

    - name: Ensure mount directory exists
      ansible.builtin.file:
        path: "{{ pbm_path }}"
        state: directory
      when: (storage_provider | default('filesystem')) == "filesystem"

    - name: Add NFS mount entry to /etc/fstab and mount it
      ansible.posix.mount:
        path: "{{ pbm_path }}"
        src: "{{ hostvars[groups['nfs'][0]].ansible_host | default(hostvars[groups['nfs'][0]]['ansible_facts']['default_ipv4']['address']) }}:{{ pbm_path }}"
        fstype: nfs
        opts: rw
        dump: 0
        passno: 0
        state: mounted
      when: (storage_provider | default('filesystem')) == "filesystem"

- name: Configure backup process
  hosts: cfg:replsets
  become: yes
  tags: backup
  tasks:
    - name: set up storage location for PBM
      shell: pbm config --file '{{ pbm_config_path }}' --mongodb-uri '{{ mongodb_uri }}'
      when: mongodb_primary is defined and mongodb_primary

    - name: Set up backup cron job
      cron:
        name: pbm backup
        minute: '{{ pbm_backup_minute }}'
        hour: '{{ pbm_backup_hour }}'
        user: '{{ pbm_os_user }}'
        job: /usr/bin/pbm backup --type '{{ pbm_backup_type }}' --mongodb-uri '{{ mongodb_uri }}'
        cron_file: pbm_daily_backup
      when: arbiter is not defined

    - name: Set up purge old backups cron job
      cron:
        name: pbm purge
        minute: '{{ pbm_purge_minute }}'
        hour: '{{ pbm_purge_hour }}'
        user: '{{ pbm_os_user }}'
        job: /usr/bin/pbm cleanup --force --older-than $(date -u -d '-{{ pbm_retention_days }} days' +'\%Y-\%m-\%d') --mongodb-uri '{{ mongodb_uri }}'
        cron_file: pbm_purge_old
      when: arbiter is not defined
