---
- name: Install MongoDB
  hosts: cfg:shards:replsets
  become: yes
  tags: install
  environment:
    PERCONA_TELEMETRY_DISABLE: "{{ '1' if disable_telemetry else '0' }}"
  tasks:
    - name: Enable the specific MongoDB version
      shell: "/usr/bin/percona-release enable {{ mongo_release }}"

    - name: Install mongod packages from repository (latest)
      package:
        name: "{{ mongod_packages }}"
        state: present
      when: mongo_version is not defined or mongo_version == ''

    - name: Install mongod packages from repository (specific version – Debian/Ubuntu)
      apt:
        name: "{{ mongod_packages | map('regex_replace', '^percona-server-mongodb$', 'percona-server-mongodb=' ~ mongo_version ~ '*') | list }}"
        state: present
        allow_downgrade: true
      when:
        - mongo_version is defined and mongo_version != ''
        - ansible_os_family == 'Debian'

    - name: Install mongod packages from repository (specific version – RedHat)
      yum:
        name: "{{ mongod_packages | map('regex_replace', '^percona-server-mongodb$', 'percona-server-mongodb-' ~ mongo_version) | list }}"
        state: present
      when:
        - mongo_version is defined and mongo_version != ''
        - ansible_os_family == 'RedHat'

    - name: Disable Percona telemetry
      systemd:
        name: percona-telemetry-agent
        enabled: false
        state: stopped
        daemon_reload: yes
      ignore_errors: true
      when: disable_telemetry | bool

- name: Prepare the configuration
  hosts: cfg:shards:replsets
  tags: bootstrap_rs
  
  vars:
    mongo_tls_flags: >-
      {% if use_tls %}
      --tls
      --tlsCertificateKeyFile {{ certificateKeyFile }}
      --tlsCAFile {{ CAFile }}
      --tlsAllowInvalidCertificates
      {% endif %}

  tasks:
    - name: Set up shared mongo keyfile 
      become: yes
      copy:
        dest: "{{ keyFile_location }}"
        content: "{{ keyfile_content }}"
        owner: mongod
        group: root
        mode: 0600
      when: not use_tls | bool

    - name: Copy mongod.conf 
      become: yes
      template:
        src: "{{ mongod_conf_template }}"
        dest: /etc/mongod.conf
        owner: root
        group: root
        mode: 0644

    - name: Create the MongoDB directories
      become: yes
      file:
        path: "{{ item }}"
        owner: mongod
        mode: '0750'
        state: directory
      with_items:
        - "{{ mongod_path }}"
        - "{{ mongod_log_path }}"

    - name: Set up keyfile for encryption at rest
      become: yes
      copy:
        dest: "{{ encryption_keyfile }}"
        content: "{{ encryption_key_content }}"
        owner: mongod
        group: root
        mode: 0600
      when: keyfile_encryption | bool

    - name: Copy Vault crt and mongo token file to all servers
      block:

        - name: Create directory for vault credentials
          become: yes
          file:
            path: /etc/mongodb
            state: directory
            owner: mongod
            group: mongod
            mode: 0500

        - name: Fetch the Vault crt file from Vault server to control machine
          become: yes
          fetch:
            src: /etc/vault.d/vault.crt
            dest: ./vault.crt
            flat: yes
          delegate_to: "{{ groups['pmm'][0] }}"
          run_once: true

        - name: Copy vault certificate to MongoDB hosts
          become: yes
          copy:
            src: "{{ playbook_dir }}/vault.crt"
            dest: "{{ vault_cafile }}"
            owner: mongod
            group: mongod
            mode: '0400'

        - name: Fetch the mongo token file from Vault server to control machine
          become: yes
          fetch:
            src: /tmp/mongo_token.txt
            dest: ./mongo_token.txt
            flat: yes
          delegate_to: "{{ groups['pmm'][0] }}"
          run_once: true

        - name: Copy token file to MongoDB hosts
          become: yes
          copy:
            src: "{{ playbook_dir }}/mongo_token.txt"
            dest: "{{ vault_tokenfile }}"
            owner: mongod
            group: mongod
            mode: '0400'

      when: vault_encryption | bool

    - name: Start mongod on replica set member
      become: yes
      service:
        name: mongod
        state: restarted

    - name: Prepare the init command for replica set
      template:
        src: "{{ rs_init_template }}"
        dest: /tmp/init-rs.js
        mode: 0644
      when: mongodb_primary | default(false)

    - name: Wait for MongoDB port
      wait_for:
        host: 127.0.0.1
        port: "{{ mongo_port }}"
        delay: 1
        timeout: 60

    - name: Initialize replica set
      command: >
        mongosh {{ mongo_tls_flags }}
        --port {{ mongo_port }}
        --host 127.0.0.1
        /tmp/init-rs.js
      when: mongodb_primary | default(false)

    - name: Wait for PRIMARY
      shell: >
        mongosh admin {{ mongo_tls_flags }}
        --port {{ mongo_port }}
        --host 127.0.0.1
        --quiet
        --eval 'rs.status().members.filter(m => m.stateStr=="PRIMARY").length'
        | grep -q 1
      register: primary_check
      retries: 30
      delay: 1
      until: primary_check.rc == 0
      changed_when: false
      when: mongodb_primary | default(false)

- name: Create the local users & logrotate
  hosts: cfg:shards:replsets
  become: yes
  tags: os_conf

  vars:
    mongo_tls_flags: >-
      {% if use_tls %}
      --tls
      --tlsCertificateKeyFile {{ certificateKeyFile }}
      --tlsCAFile {{ CAFile }}
      --tlsAllowInvalidCertificates
      {% endif %}

  tasks:
    - name: Copy logrotate conf
      template:
        src: templates/logrotate-mongod.conf.j2
        dest: /etc/logrotate.d/mongod
        mode: 0644

    - name: Create MongoDB root user
      shell: >
        mongosh admin {{ mongo_tls_flags }}
        --port {{ mongo_port }}
        --host 127.0.0.1
        --eval 'db.createUser({user:"{{ mongo_admin_user }}",pwd:"{{ mongo_admin_password }}",roles:["root"]})'
      no_log: true
      when: mongodb_primary | default(false)

    - name: Prepare the commands to create the PBM and PMM users and roles
      template:
        src: templates/createUsers.js.j2
        dest: /tmp/createUsers.js
        mode: 0644
      when: mongodb_primary | default(false)

    - name: Create PBM and PMM users
      shell: >
        mongosh admin {{ mongo_tls_flags }}
        -u {{ mongo_admin_user }}
        -p {{ mongo_admin_password }}
        --port {{ mongo_port }}
        --host {{ ansible_fqdn }}
        < /tmp/createUsers.js
      no_log: true
      when: mongodb_primary | default(false)

    - name: Configure mongo shell alias
      lineinfile:
        path: /etc/profile
        line: >
          alias mongo='mongosh admin {{ mongo_tls_flags }}
          -u {{ mongo_admin_user }}
          -p {{ mongo_admin_password }}
          --port {{ mongo_port }}
          --host {{ ansible_fqdn }}'
        state: present