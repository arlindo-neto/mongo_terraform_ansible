---
- name: Validate NFS inventory when filesystem storage is enabled
  ansible.builtin.assert:
    that:
      - "'nfs' in groups"
      - "groups.get('nfs', []) | length > 0"
    fail_msg: "storage_provider=filesystem requires an inventory group [nfs] with at least one host"
  run_once: true

- name: Collect minimal facts from NFS server when ansible_host is not set
  ansible.builtin.setup:
    filter: ansible_default_ipv4
  delegate_to: "{{ groups['nfs'][0] }}"
  delegate_facts: true
  run_once: true
  when: hostvars[groups['nfs'][0]].ansible_host is not defined

- name: Ensure mount directory exists
  ansible.builtin.file:
    path: "{{ pbm_path }}"
    state: directory

- name: Add NFS mount entry to /etc/fstab and mount it
  ansible.posix.mount:
    path: "{{ pbm_path }}"
    src: "{{ hostvars[groups['nfs'][0]].ansible_host | default(hostvars[groups['nfs'][0]]['ansible_facts']['default_ipv4']['address']) }}:{{ pbm_path }}"
    fstype: nfs
    opts: rw
    dump: 0
    passno: 0
    state: mounted
